version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: medisync-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - medisync-network

  redis:
    image: redis:alpine
    container_name: medisync-redis
    ports:
      - "6379:6379"
    networks:
      - medisync-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisync-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/medisync
      - REDIS_URL=redis://redis:6379
      # NOTE: For full functionality, other keys like JWT_SECRET, GEMINI_API_KEY must be supplied
    depends_on:
      - mongodb
      - redis
    networks:
      - medisync-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medisync-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - medisync-network

volumes:
  mongo_data:

networks:
  medisync-network:
    driver: bridge
